<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Pong Neon</title>
  <link rel="stylesheet" href="style.css">
  <link url="https://googleapis.com" rel="stylesheet">
  <script src="https://unpkg.com"></script>
</head>
<body>

  <a href="https://synth-joy-station.onrender.com/" class="btn-regresar-arcade">🕹️ EXIT TO CABINET</a>
  <div class="efecto-crt-lineas"></div>

  <div id="contenedor-juego">
    
    <!-- PANTALLA 1: CONFIGURACIÓN Y MENÚ -->
    <div id="menu-inicio">
      <h1 class="titulo-neon">CYBER PONG</h1>
      <p class="subtitulo">VECTOR DEPLOYMENT PROTOCOL</p>
      
      <!-- SECCIÓN DE ALIAS PERSONALIZADO -->
      <div class="seccion-alias">
        <label for="input-alias">ENTER USER ALIAS:</label>
        <input type="text" id="input-alias" value="PLAYER_1" maxlength="12">
      </div>

      <div class="selector-dificultad">
        <label for="select-diff">IA CORE LEVEL:</label>
        <select id="select-diff">
          <option value="easy">MINIMAL ERROR // EASY</option>
          <option value="medium" selected>STANDARD LOGIC // MEDIUM</option>
          <option value="hard">IMPLACABLE BOT // HARD</option>
        </select>
      </div>

      <div class="opciones-modo">
        <button class="btn-modo" onclick="seleccionarModo('ia')">💾 VS INFECTED IA (1P)</button>
        <button class="btn-modo" onclick="seleccionarModo('local')">🕹️ LOCAL SPLIT (2P CO-OP)</button>
        <button class="btn-modo" onclick="seleccionarModo('online')">🌐 P2P ONLINE NETWORK</button>
      </div>

      <!-- PANEL MULTIJUGADOR ONLINE -->
      <div id="panel-online" class="oculto">
        <div class="linea-division"></div>
        
        <!-- Zona de Generación Manual con Botón Metálico -->
        <div class="area-generacion">
          <p>YOUR SYSTEM ID: <span id="mi-id" class="resaltado">OFFLINE // N/A</span></p>
          <button id="btn-crear-id" class="btn-accion" onclick="activarNodoRed()">⚡ GENERATE ID</button>
        </div>
        
        <div class="inputs-online">
          <input type="text" id="input-peer-id" placeholder="ENTER ENEMY ID...">
          <button class="btn-accion" onclick="conectarAEnemigo()">CONNECT NODE</button>
        </div>
        <p id="estado-conexion">Awaiting manual synchronization protocol...</p>
      </div>


    <!-- PANTALLA 2: ÁREA DE JUEGO PRINCIPAL -->
    <div id="escenario-juego" class="oculto">
      <div class="cabecera-arena">
        <div class="nombre-marcador" id="label-p1">PLAYER 1</div>
        
        <!-- CONTADOR DE PUNTOS DINÁMICO -->
        <div class="marcador">
          <span id="score-p1">00</span>
          <span class="separador">:</span>
          <span id="score-p2">00</span>
        </div>
        
        <div class="nombre-marcador" id="label-p2">PLAYER 2</div>
      </div>
      
      <!-- CONTROLES DE FLUJO DE PARTIDA CON REGRESO AL MENÚ -->
      <div class="controles-partida">
        <button id="btn-start-match" onclick="iniciarPartidaFisica()">🎮 START MATCH</button>
        <button id="btn-reset-match" onclick="reiniciarPartidaCompleta()">🔄 RESET ARENA</button>
        <button id="btn-main-menu" onclick="volverAlMenuInicial()">🖥️ MAIN MENU</button>
      </div>
      
      <div class="cuerpo-arena">
        <canvas id="lienzo-pong" width="800" height="480"></canvas>
        
        <div id="caja-chat-online" class="chat-contenedor oculto">
          <div class="chat-cabecera">🌐 COGNITIVE COMS CHAT</div>
          <div id="chat-mensajes" class="chat-mensajes"></div>
          <div class="chat-input-area">
            <input type="text" id="input-msg-chat" placeholder="Escribe un mensaje..." onkeypress="evaluarTeclaChat(event)">
            <button onclick="enviarMensajeChat()">SEND</button>
          </div>
        </div>
      </div>
      
      <div class="controles-ayuda" id="ayuda-teclado">
        Controles: P1 (W/S) | P2 (Flechas ↑/↓)
      </div>
    </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
